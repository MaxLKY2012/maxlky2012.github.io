<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoMind · 会思考的五子棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            transition: background-color 2s ease-in-out;
            animation: breatheBg 20s infinite alternate;
        }

        @keyframes breatheBg {
            0% { background-color: #eef7ff; }
            50% { background-color: #f0f8ff; }
            100% { background-color: #f5f5f5; }
        }

        .game-container {
            background-color: #d2b48c;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.15);
            margin-bottom: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 32px); /* 14列 + 1列表头 */
            grid-template-rows: repeat(15, 32px); /* 14行 + 1行表头 */
            gap: 0;
            border: 2px solid #8b4513;
        }

        .cell {
            width: 32px;
            height: 32px;
            border: 1px solid #a67b5b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #d2b48c;
            transition: background-color 0.3s, border-color 0.3s;
            position: relative;
        }

        .cell:hover {
            background-color: #f5e6d3;
        }

        .cell.last-move-highlight {
            border: 3px solid #ffcc00 !important; /* 高亮上一手落子 */
            border-radius: 3px;
            box-shadow: inset 0 0 5px rgba(255, 204, 0, 0.5);
        }

        /* 获胜连线高亮样式 */
.winning-highlight {
    background-color: rgba(66, 135, 245, 0.7) !important;
    border: 2px solid #4287f5 !important;
    border-radius: 5px;
    box-shadow: 0 0 8px rgba(66, 135, 245, 0.8), inset 0 0 8px rgba(255, 255, 255, 0.5);
    animation: winningPulse 1.5s ease-in-out infinite alternate;
}

/* 高亮动画 */
@keyframes winningPulse {
    0% {
        box-shadow: 0 0 8px rgba(66, 135, 245, 0.8), inset 0 0 8px rgba(255, 255, 255, 0.5);
        transform: scale(1);
    }
    100% {
        box-shadow: 0 0 15px rgba(66, 135, 245, 1), inset 0 0 12px rgba(255, 255, 255, 0.8);
        transform: scale(1.05);
    }
}

        .header-cell {
            background-color: #d2b48c;
            color: white;
            font-weight: bold;
            cursor: default;
        }

        .black {
            color: #222;
        }

        .white {
            color: #fff;
            text-shadow: 0 0 2px #666;
        }

        .info {
            text-align: center;
            margin: 15px 0;
            font-size: 20px;
            color: #444;
            font-weight: 500;
        }

        .robot-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            width: 100%;
        }

        .robot-bubble {
            background-color: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 80%;
            text-align: center;
            font-size: 16px;
            color: #333;
            border: 1px solid #eee;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .robot-bubble.show {
            opacity: 1;
            transform: translateY(0);
        }

        .robot-body {
            width: 100px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .robot-head {
            width: 80px;
            height: 60px;
            background: linear-gradient(135deg, #4a4a4a 0%, #2c2c2c 100%);
            border-radius: 10px 10px 5px 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #1a1a1a;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .robot-antenna {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .antenna-base {
            width: 4px;
            height: 10px;
            background-color: #666;
            margin: 0 auto;
        }

        .antenna-tip {
            width: 8px;
            height: 8px;
            background-color: #00bfff;
            border-radius: 50%;
            margin: 0 auto;
            animation: blink 2s infinite;
        }

        .robot-face {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .robot-eyes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 8px;
        }

        .eye {
            width: 12px;
            height: 12px;
            background-color: #00bfff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00bfff;
        }

        .robot-display {
            width: 40px;
            height: 18px;
            background-color: #1a3c34;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 3px;
            border: 1px solid #0a2c22;
            font-weight: bold;
        }

        .robot-torso {
            width: 100px;
            height: 70px;
            background: linear-gradient(135deg, #5a5a5a 0%, #3a3a3a 100%);
            border-radius: 0 0 10px 10px;
            margin-top: -2px;
            border: 3px solid #1a1a1a;
            border-top: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .torso-panel {
            width: 60px;
            height: 40px;
            background-color: #2a2a2a;
            border-radius: 5px;
            border: 2px solid #1a1a1a;
            position: relative;
            overflow: hidden;
        }

        .torso-panel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                #00bfff 4px,
                #00bfff 8px
            );
            top: 10px;
            animation: scan 3s linear infinite;
        }

        .torso-panel::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                #00bfff 4px,
                #00bfff 8px
            );
            bottom: 10px;
            animation: scan 2.5s linear infinite reverse;
        }

        /* 动画 */
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.3; }
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 8px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(92, 184, 92, 0.3);
        }

/* 为包含Unicode字符的按钮添加样式 */
.btn-with-unicode {
    font-size: 16px;
    line-height: 1.5;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

/* Unicode字符样式 */
.btn-unicode {
    font-size: 18px;
    margin-right: 8px;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
}

        .btn:hover {
            background-color: #4cae4c;
            transform: translateY(-2px);
        }

        .admin-panel {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin-top: 25px;
            display: none;
            width: 90%;

        }

        .admin-panel input, .admin-panel select {
            padding: 8px;

        }

        .info-panel {

            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin-top: 25px;
            display: none;
            text-align: left;
            width: 90%;
            max-width: 500px;
            line-height: 1.6;
        }

        .win-text {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }

        .win-black {
            color: #222;
        }

        .win-white {
            color: #fff;
            background-color: #5cb85c;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .win-draw {
            color: #f0ad4e;
        }

        .game-result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .result-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .result-stats {
            font-size: 20px;
            margin: 15px 0;
            line-height: 1.8;
        }
        /* 结算画面按钮容器 */
        .result-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* 结算画面通用按钮样式 */
        .result-btn {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 160px;
        }

        /* 查看棋盘按钮 (蓝色) */
        .result-btn.view-board {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .result-btn.view-board:hover {
            background: linear-gradient(135deg, #2980b9, #1f6396);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 128, 185, 0.4);
        }

        /* 再来一局按钮 (绿色) - 修改原有.close-result的样式 */
        .result-btn.restart {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .result-btn.restart:hover {
            background: linear-gradient(135deg, #27ae60, #219653);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .close-result {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            background-color: #ff6b6b;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .close-result:hover {
            background-color: #ff5252;
        }
        /* 垂直按钮容器样式 - 添加到现有CSS末尾 */
.vertical-buttons-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    width: 100%;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
}

/* 垂直排列按钮样式 */
.btn-vertical {
    width: 100% !important;
    text-align: center;
    padding: 12px 0 !important;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;

}

/* 悬停效果 */
.btn-vertical:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    opacity: 0.95;
}
    </style>
</head>
<body>
    <div class="info" id="gameInfo">游戏加载中...</div>
    <div class="info" id="lastMoveInfo"></div>
    
    <div class="game-container">
        <div class="board" id="board"></div>
    </div>
    <!-- 垂直按钮容器 -->
<div class="vertical-buttons-container">
    <button class="btn btn-vertical" onclick="exportBoard()" style="background-color:#3498db;">
        &#x1F4E5; 导出当前棋局
    </button>
    
    <button class="btn btn-vertical" onclick="importBoard()" style="background-color:#9b59b6;">

    </button>
    
    <button class="btn btn-vertical" onclick="restartGame()" style="background-color:#5cb85c;">
        &#x21bb; 重新开始
    </button>
    
    <button class="btn btn-vertical" onclick="undoMove()" style="background-color:#f0ad4e;">
        &#x21b6; 悔棋
    </button>
    
    <button class="btn btn-vertical" onclick="showInfo()" style="background-color:#5bc0de;">
        &#x1F4D6; 游戏规则
    </button>
    
    <button class="btn btn-vertical" onclick="showAdmin()" style="background-color:#d9534f;">
        &#x2699;&#xFE0F; 修改器
    </button>
</div>

    <!-- 机器人区域 -->
        <div class="robot-area">
            <div class="robot-bubble" id="robotBubble"></div>
            <div class="robot-body">
                <!-- 机器人头部（方形） -->
                <div class="robot-head">
                    <!-- 天线 -->
                    <div class="robot-antenna">
                        <div class="antenna-base"></div>
                        <div class="antenna-tip"></div>
                    </div>
                    <!-- 面部 -->
                    <div class="robot-face">
                        <!-- 眼睛（两个蓝色光点） -->
                        <div class="robot-eyes">
                            <div class="eye left-eye"></div>
                            <div class="eye right-eye"></div>
                        </div>
                        <!-- 显示屏（用于显示表情/信息） -->

                    </div>

    <!-- 结算画面 -->
    <div class="game-result-screen" id="resultScreen">
        <div class="result-content">
            <div id="resultTitle" class="result-title"></div>
            <div id="resultStats" class="result-stats"></div>
            <div class="result-buttons">
                <button class="result-btn view-board" onclick="viewFinalBoard()">
                    	&#x265F; 查看棋盘
                </button>
                <button class="result-btn restart" onclick="closeResult()">
                    	&#x21bb; 再来一局
                </button>
            </div>
        </div>
    </div>

    <!-- 修改器面板 -->
    <div class="admin-panel" id="adminPanel">
        <h3>&#9881; 修改器模式</h3>
        <p>操作指令：</p>
        <p>1. 移除棋子：<input type="number" id="removeR" min="1" max="14"> 行 <input type="number" id="removeC" min="1" max="14"> 列 <button class="btn" onclick="removePiece()" style="padding:5px 10px; font-size:14px;">移除</button></p>
        <p>2. 修改棋子：<input type="number" id="changeR" min="1" max="14"> 行 <input type="number" id="changeC" min="1" max="14"> 列 改为 <select id="changeTo"><option value="2">玩家(O)</option><option value="1">AI(X)</option></select> <button class="btn" onclick="changePiece()" style="padding:5px 10px; font-size:14px;">修改</button></p>
        <p>3. 判定胜利：<button class="btn" onclick="letWin(2)" style="background-color:#5cb85c;">玩家胜利</button> <button class="btn" onclick="letWin(1)" style="background-color:#222;">AI胜利</button></p>
        <button class="btn" onclick="hideAdmin()" style="background-color:#d9534f;">退出修改器模式</button>
    </div>

    <!-- 信息面板 -->
    <div class="info-panel" id="infoPanel">
        <h3>&#128214; 游戏信息</h3>
        <p>1. AI使用黑色棋子(X)，玩家使用白色棋子(O)</p>
        <p>2. 点击棋盘对应位置落子</p>
        <p>3. 连成5子即可获胜</p>
        <p>4. 高亮边框表示上一步落子位置</p>
        <button class="btn" onclick="hideInfo()">关闭</button>
    </div>

    <script>
        // 游戏常量
        const BOARD_SIZE = 14;
        const WIN_COUNT = 5;
        const EMPTY = 0;
        const AI = 1;    // X
        const PLAYER = 2; // O

        // 游戏状态
        let gameMap = Array(BOARD_SIZE + 1).fill().map(() => Array(BOARD_SIZE + 1).fill(EMPTY));
        let lastMoveX = -1;
        let lastMoveY = -1;
        let currentPlayer;
        let gameOver = false;
        let gameStartTime;
        let moveCount = 0;
        let lastPlayerMoveX = -1;
        let lastPlayerMoveY = -1;
        let moveHistory = [];

        // DOM元素
        const boardElement = document.getElementById('board');
        const gameInfoElement = document.getElementById('gameInfo');
        const lastMoveElement = document.getElementById('lastMoveInfo');
        const adminPanel = document.getElementById('adminPanel');
        const infoPanel = document.getElementById('infoPanel');
        const robotBubble = document.getElementById('robotBubble');
        const robotMouth = document.getElementById('robotMouth');
        const resultScreen = document.getElementById('resultScreen');
        const resultTitle = document.getElementById('resultTitle');
        const resultStats = document.getElementById('resultStats');
        const bodyElement = document.body;

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            gameMap = Array(BOARD_SIZE + 1).fill().map(() => Array(BOARD_SIZE + 1).fill(EMPTY));
            lastMoveX = -1;
            lastMoveY = -1;
            gameOver = false;
            moveCount = 0;
            gameStartTime = new Date();
            
            // 随机决定先手
            currentPlayer = Math.random() > 0.5 ? AI : PLAYER;
            renderBoard();
            updateGameInfo();
            updateBackground(); // 初始背景色
            updateRobotExpression('normal'); // 初始表情
            hideBubble(); // 隐藏气泡
            
            // 如果AI先手，延迟落子
            if (currentPlayer === AI) {
                setTimeout(aiMove, 500);
            }
        }

        // 渲染棋盘
        function renderBoard() {
            boardElement.innerHTML = '';
            
            // 渲染表头（行号列号）
            for (let i = 0; i <= BOARD_SIZE; i++) {
                for (let j = 0; j <= BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (i === 0 && j === 0) {
                        cell.className += ' header-cell';
                        cell.textContent = '';
                    } else if (i === 0) {
                        cell.className += ' header-cell';
                        cell.textContent = j;
                    } else if (j === 0) {
                        cell.className += ' header-cell';
                        cell.textContent = i;
                    } else {
                        // 可落子单元格
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        cell.onclick = () => playerMove(i, j);
                        
                        // 渲染棋子
                        if (gameMap[i][j] === AI) {
                            cell.textContent = 'X';
                            cell.className += ' black';
                        } else if (gameMap[i][j] === PLAYER) {
                            cell.textContent = 'O';
                            cell.className += ' white';
                        }
                        
                        // 高亮显示最后落子位置
                        if (i === lastMoveX && j === lastMoveY) {
                            cell.classList.add('last-move-highlight');
                        }
                    }
                    
                    boardElement.appendChild(cell);
                }
            }
            
            // 更新最后一步信息
            if (lastMoveX !== -1 && lastMoveY !== -1) {
                const player = gameMap[lastMoveX][lastMoveY] === AI ? 'AI' : '玩家';
                lastMoveElement.textContent = `最后落子: ${player} 于 ${lastMoveX} 行 ${lastMoveY} 列`;
                lastMoveElement.style.color = gameMap[lastMoveX][lastMoveY] === AI ? '#222' : '#5cb85c';
            } else {
                lastMoveElement.textContent = '';
            }
        }
        // 悔棋功能（修正版）
function undoMove() {
    // 游戏已结束时不能悔棋
    if (gameOver) {
        showBubble("游戏已结束，无法悔棋哦~");
        return false;
    }
    
    // 历史记录为空时不能悔棋
    if (moveHistory.length === 0) {
        showBubble("已经是初始状态，无法继续悔棋了");
        return false;
    }
    
    // 撤回后将无棋子时不能悔棋
    if (moveHistory.length <= 1) {
        showBubble("撤回后将无棋子，无法悔棋");
        return false;
    }
    
    // AI回合时不能悔棋
    if (currentPlayer === AI) {
        showBubble("现在是AI的回合，请等待AI落子后再操作");
        return false;
    }
    
    // 计算需要撤回的步数
    let stepsToUndo = 2; // 默认撤回两步
    
    // 如果历史记录不够两步，只撤回一步
    if (moveHistory.length < stepsToUndo) {
        stepsToUndo = moveHistory.length;
    }
    
    // 记录撤回的信息
    let undoneMoves = [];
    
    // 执行撤回操作
    for (let i = 0; i < stepsToUndo; i++) {
        if (moveHistory.length === 0) break;
        
        const lastMove = moveHistory.pop();
        gameMap[lastMove.row][lastMove.col] = EMPTY;
        moveCount--;
        undoneMoves.push(lastMove);
    }
    
    // 更新最后落子位置
    if (moveHistory.length > 0) {
        const lastMove = moveHistory[moveHistory.length - 1];
        lastMoveX = lastMove.row;
        lastMoveY = lastMove.col;
    } else {
        lastMoveX = -1;
        lastMoveY = -1;
    }

// 辅助函数：分析指定位置落子后形成的棋型
function analyzePatterns(x, y, player) {
    const patterns = {
        liveFour: 0,   // 活四
        rushFour: 0,   // 冲四
        liveThree: 0,  // 活三
        sleepThree: 0, // 冲三
    };

    // 四个方向检查
    const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
    
    for (const [dx, dy] of directions) {
        // 更精确的棋型判断
        let patternInfo = analyzeDirection(x, y, dx, dy, player);
        
        patterns.liveFour += patternInfo.liveFour;
        patterns.rushFour += patternInfo.rushFour;
        patterns.liveThree += patternInfo.liveThree;
        patterns.sleepThree += patternInfo.sleepThree;
    }
    
    return patterns;
}

    const url = URL.createObjectURL(blob);

    a.download = `五子棋棋局_${new Date().toLocaleDateString().replace(/\//g, '-')}_${moveCount}步.json`;

    URL.revokeObjectURL(url);

// 导入/加载棋局
function importBoard() {
    // 创建文件选择输入框
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = ".json";
    fileInput.style.display = "none";
    
    fileInput.onchange = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const boardData = JSON.parse(e.target.result);
                
                // 验证数据格式
                if (!validateBoardData(boardData)) {
                    showBubble("文件格式错误，无法加载");
                    updateRobotExpression('thinking');
                    return;
                }
                
                // 应用棋局数据
                loadBoardData(boardData);
                
                // 显示成功消息
                showBubble(`成功加载棋局！当前${moveCount}步，${currentPlayer === PLAYER ? "玩家" : "AI"}回合`);
                updateRobotExpression('normal');
                
            } catch (error) {
                console.error("加载棋局失败:", error);
                showBubble("加载失败：文件格式不正确");
                updateRobotExpression('thinking');
            }
        };
        
        reader.readAsText(file);
    };
    
    document.body.appendChild(fileInput);
    fileInput.click();
    document.body.removeChild(fileInput);
}

// 验证棋局数据
function validateBoardData(data) {
    // 基本验证
    if (!data.gameMap || !Array.isArray(data.gameMap)) return false;
    if (data.gameMap.length !== BOARD_SIZE + 1) return false;
    if (typeof data.currentPlayer !== 'number') return false;
    if (typeof data.moveCount !== 'number') return false;
    
    // 棋盘数据验证
    for (let i = 0; i <= BOARD_SIZE; i++) {
        if (!Array.isArray(data.gameMap[i]) || data.gameMap[i].length !== BOARD_SIZE + 1) {
            return false;
        }
        
        for (let j = 0; j <= BOARD_SIZE; j++) {
            const cell = data.gameMap[i][j];
            if (cell !== EMPTY && cell !== AI && cell !== PLAYER) {
                return false;
            }
        }
    }
    
    return true;
}

// 新的辅助函数：分析单个方向上的棋型
function analyzeDirection(x, y, dx, dy, player) {
    const result = {
        liveFour: 0,
        rushFour: 0,
        liveThree: 0,
        sleepThree: 0
    };

    // 1. 检查当前方向上的连续棋子
    let forwardCount = 0;
    let backwardCount = 0;
    
    // 正向检查（不包括当前位置）
    for (let k = 1; k <= 4; k++) {
        const nx = x + dx * k;
        const ny = y + dy * k;
        if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
        if (gameMap[nx][ny] === player) {
            forwardCount++;
        } else {
            break;
        }
    }
    
    // 反向检查（不包括当前位置）
    for (let k = 1; k <= 4; k++) {
        const nx = x - dx * k;
        const ny = y - dy * k;
        if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
        if (gameMap[nx][ny] === player) {
            backwardCount++;
        } else {
            break;
        }
    }
    
    const totalCount = forwardCount + backwardCount + 1; // 加上当前位置
    
    // 2. 检查两端的情况
    const forwardEndX = x + dx * (forwardCount + 1);
    const forwardEndY = y + dy * (forwardCount + 1);
    const backwardEndX = x - dx * (backwardCount + 1);
    const backwardEndY = y - dy * (backwardCount + 1);
    
    const forwardEmpty = (forwardEndX >= 1 && forwardEndX <= BOARD_SIZE && 
                         forwardEndY >= 1 && forwardEndY <= BOARD_SIZE && 
                         gameMap[forwardEndX][forwardEndY] === EMPTY);
    
    const backwardEmpty = (backwardEndX >= 1 && backwardEndX <= BOARD_SIZE && 
                          backwardEndY >= 1 && backwardEndY <= BOARD_SIZE && 
                          gameMap[backwardEndX][backwardEndY] === EMPTY);
    
    const forwardBlocked = !forwardEmpty && (forwardEndX < 1 || forwardEndX > BOARD_SIZE || 
                          forwardEndY < 1 || forwardEndY > BOARD_SIZE || 
                          gameMap[forwardEndX][forwardEndY] !== EMPTY);
    
    const backwardBlocked = !backwardEmpty && (backwardEndX < 1 || backwardEndX > BOARD_SIZE || 
                           backwardEndY < 1 || backwardEndY > BOARD_SIZE || 
                           gameMap[backwardEndX][backwardEndY] !== EMPTY);
    
    // 3. 判断棋型
    if (totalCount === 4) {
        if (!forwardBlocked && !backwardBlocked) {
            result.liveFour = 1;
        } else if ((!forwardBlocked && backwardBlocked) || (forwardBlocked && !backwardBlocked)) {
            result.rushFour = 1;
        }
    } else if (totalCount === 3) {
        // 真正的活三：连续三个棋子，且两端都没有阻挡（可以是边界或空位）
        // 但两端必须至少有一端是空位（不能两端都是边界）
        const hasEmptyEnd = (forwardEmpty || backwardEmpty);
        
        if (!forwardBlocked && !backwardBlocked && hasEmptyEnd) {
            result.liveThree = 1;
        } else if ((!forwardBlocked && backwardBlocked) || (forwardBlocked && !backwardBlocked)) {
            result.sleepThree = 1;
        }
    }
    
    return result;
}

function getBestMove() {
    for (let i = 1; i <= BOARD_SIZE; i++) {
        for (let j = 1; j <= BOARD_SIZE; j++) {
            if (gameMap[i][j] === EMPTY) {
                gameMap[i][j] = AI;
                if (checkWin(AI)) {
                    gameMap[i][j] = EMPTY;
                    return { row: i, col: j };
                }
                gameMap[i][j] = EMPTY;
            }
        }
    }

    for (let i = 1; i <= BOARD_SIZE; i++) {
        for (let j = 1; j <= BOARD_SIZE; j++) {
            if (gameMap[i][j] === EMPTY) {
                gameMap[i][j] = PLAYER;
                if (checkWin(PLAYER)) {
                    gameMap[i][j] = EMPTY;
                    return { row: i, col: j };
                }
                gameMap[i][j] = EMPTY;
            }
        }
    }
    
    for (let i = 1; i <= BOARD_SIZE; i++) {
        for (let j = 1; j <= BOARD_SIZE; j++) {
            if (gameMap[i][j] === EMPTY) {
                gameMap[i][j] = PLAYER;
                
                let hasLiveThree = false;
                
                const directions = [[0,1], [1,0], [1,1], [1,-1]];
                for (const [dx, dy] of directions) {
                    let consecutive = 1;
                    for (let k = 1; k < 5; k++) {
                        const nx = i + dx * k;
                        const ny = j + dy * k;
                        if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE || gameMap[nx][ny] !== PLAYER) break;
                        consecutive++;
                    }
                    
                    for (let k = 1; k < 5; k++) {
                        const nx = i - dx * k;
                        const ny = j - dy * k;
                        if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE || gameMap[nx][ny] !== PLAYER) break;
                        consecutive++;
                    }
                    
                    if (consecutive >= 3) {
                        let forwardEmpty = true;
                        let backwardEmpty = true;
                        
                        const forwardEndX = i + dx * consecutive;
                        const forwardEndY = j + dy * consecutive;
                        if (forwardEndX >= 1 && forwardEndX <= BOARD_SIZE && forwardEndY >= 1 && forwardEndY <= BOARD_SIZE) {
                            forwardEmpty = gameMap[forwardEndX][forwardEndY] === EMPTY;
                        }
                        
                        const backwardEndX = i - dx * consecutive;
                        const backwardEndY = j - dy * consecutive;
                        if (backwardEndX >= 1 && backwardEndX <= BOARD_SIZE && backwardEndY >= 1 && backwardEndY <= BOARD_SIZE) {
                            backwardEmpty = gameMap[backwardEndX][backwardEndY] === EMPTY;
                        }
                        
                        if (forwardEmpty && backwardEmpty) {
                            hasLiveThree = true;
                            break;
                        }
                    }
                }
                
                gameMap[i][j] = EMPTY;
                
                if (hasLiveThree) {
                    return { row: i, col: j };
                }
            }
        }
    }
    
    let bestScore = -1;
    let bestMove = { row: Math.ceil(BOARD_SIZE/2), col: Math.ceil(BOARD_SIZE/2) }; 
    
    for (let i = 1; i <= BOARD_SIZE; i++) {
        for (let j = 1; j <= BOARD_SIZE; j++) {
            if (gameMap[i][j] === EMPTY) {
                const aiScore = evaluatePosition(i, j, AI);
                const playerScore = evaluatePosition(i, j, PLAYER);
                const totalScore = aiScore * 2 + playerScore;
                
                if (totalScore > bestScore) {
                    bestScore = totalScore;
                    bestMove = { row: i, col: j };
                }
            }
        }
    }
    
    return bestMove;
}

        // 位置评分
        function evaluatePosition(x, y, player) {
            if (gameMap[x][y] !== EMPTY) return -1;
            
            let score = 0;
            const directions = [[0,1], [1,0], [1,1], [1,-1]];
            
            for (const [dx, dy] of directions) {
                let count = 1;
                
                // 正向计数
                for (let i = 1; i < WIN_COUNT; i++) {
                    const nx = x + dx * i;
                    const ny = y + dy * i;
                    if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
                    if (gameMap[nx][ny] === player) count++;
                    else if (gameMap[nx][ny] !== EMPTY) break;
                }
                
                // 反向计数
                for (let i = 1; i < WIN_COUNT; i++) {
                    const nx = x - dx * i;
                    const ny = y - dy * i;
                    if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
                    if (gameMap[nx][ny] === player) count++;
                    else if (gameMap[nx][ny] !== EMPTY) break;
                }
                
                // 按连子数加分
                if (count >= WIN_COUNT) score += 1000;
                else if (count === WIN_COUNT - 1) score += 100;
                else if (count === WIN_COUNT - 2) score += 10;
                else if (count === WIN_COUNT - 3) score += 1;
            }
            
            // 中心位置加分
            const centerDist = Math.abs(x - (BOARD_SIZE + 1) / 2) + Math.abs(y - (BOARD_SIZE + 1) / 2);
            score += (BOARD_SIZE - centerDist);
            
            return score;
        }

        // 检查胜负
        function checkWin(player) {
            for (let i = 1; i <= BOARD_SIZE; i++) {
                for (let j = 1; j <= BOARD_SIZE; j++) {
                    if (gameMap[i][j] === player) {
                        if (checkDirection(i, j, 0, 1, player) ||  // 横向
                            checkDirection(i, j, 1, 0, player) ||  // 纵向
                            checkDirection(i, j, 1, 1, player) ||  // 右下斜向
                            checkDirection(i, j, 1, -1, player)) { // 左下斜向
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 检查单方向连子
        function checkDirection(x, y, dx, dy, player) {
            let count = 1;
            
            // 正向
            for (let i = 1; i < WIN_COUNT; i++) {
                const nx = x + dx * i;
                const ny = y + dy * i;
                if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
                if (gameMap[nx][ny] === player) count++;
                else break;
            }
            
            // 反向
            for (let i = 1; i < WIN_COUNT; i++) {
                const nx = x - dx * i;
                const ny = y - dy * i;
                if (nx < 1 || nx > BOARD_SIZE || ny < 1 || ny > BOARD_SIZE) break;
                if (gameMap[nx][ny] === player) count++;
                else break;
            }
            
            return count >= WIN_COUNT;
        }

        // 检查棋盘是否满
        function isBoardFull() {
            for (let i = 1; i <= BOARD_SIZE; i++) {
                for (let j = 1; j <= BOARD_SIZE; j++) {
                    if (gameMap[i][j] === EMPTY) return false;
                }
            }
            return true;
        }

        // 检查游戏结果
        function checkGameResult() {
    if (checkWin(AI)) {
        gameOver = true;
        gameInfoElement.innerHTML = '<span class="win-text win-black">🤖 AI获胜！你输了，再接再厉！</span>';
        updateRobotExpression('win');
        showBubble('哈哈，我赢了！要再来一局吗？');
        showResultScreen(false); // AI胜利
        // 失败背景色
        bodyElement.style.backgroundColor = 'hsl(0, 40%, 95%)';
        bodyElement.style.animation = 'none';
    } else if (checkWin(PLAYER)) {
        gameOver = true;
        gameInfoElement.innerHTML = '<span class="win-text win-white">🎉 你获胜！恭喜</span>';
        updateRobotExpression('lose');
        showBubble('好吧，你赢了... 下次我会更努力的！');
        showResultScreen(true); // 玩家胜利
        // 胜利背景色
        bodyElement.style.backgroundColor = 'hsl(120, 40%, 95%)';
        bodyElement.style.animation = 'none';
    } else if (isBoardFull()) {
        gameOver = true;
        gameInfoElement.innerHTML = '<span class="win-text win-draw">🤝 平局！</span>';
        updateRobotExpression('thinking');
        showBubble('势均力敌！平局也不错~');
        showResultScreen(null); // 平局
    } else {
        updateGameInfo();
        // 继续背景色呼吸灯效果
        const bgInterval = setInterval(updateBackground, 100);
        setTimeout(() => clearInterval(bgInterval), 1000);
    }
}

        // 显示结算画面
        function showResultScreen(playerWon) {
            const endTime = new Date();
            const duration = Math.floor((endTime - gameStartTime) / 1000); // 秒
            const minutes = Math.floor(duration / 60);
            const seconds = duration % 60;
            
            if (playerWon === true) {
                resultTitle.textContent = '🎉 恭喜你获胜！';
                resultTitle.style.color = '#5cb85c';
            } else if (playerWon === false) {
                resultTitle.textContent = '🤖 AI 获胜';
                resultTitle.style.color = '#222';
            } else {
                resultTitle.textContent = '🤝 平局';
                resultTitle.style.color = '#f0ad4e';
            }
            
            resultStats.innerHTML = `
                总步数: <strong>${moveCount}</strong> 步<br>
                游戏时长: <strong>${minutes}分${seconds}秒</strong><br>
                最后落子: <strong>${lastMoveX}行 ${lastMoveY}列</strong>
            `;
            
            resultScreen.style.display = 'flex';
        }

        function closeResult() {
            resultScreen.style.display = 'none';
            restartGame();
        }
        // 查看最终棋盘
        function viewFinalBoard() {
    resultScreen.style.display = 'none';
    lockBoard(true);
    
    // 修复：平局时显示"平局"而非"胜方"
    let statusText = '';
    if (checkWin(AI)) {
        statusText = '胜方: AI (X)';
    } else if (checkWin(PLAYER)) {
        statusText = '胜方: 玩家 (O)';
    } else {
        statusText = '平局';
    }
    
    gameInfoElement.innerHTML = `<span style="color:#9b59b6;">&#x1F4D6; 复盘模式 | ${statusText} | 点击"重新开始"继续游戏</span>`;
    highlightWinningLine();
}

        // 锁定或解锁棋盘
        function lockBoard(isLocked) {
            const cells = document.querySelectorAll('.cell[data-row][data-col]');
            cells.forEach(cell => {
                if (isLocked) {
                    // 存储原始事件，以便恢复
                    cell.dataset.originalOnclick = cell.onclick ? cell.onclick.toString() : '';
                    cell.onclick = null; // 移除点击事件
                    cell.style.cursor = 'default'; // 更改鼠标样式
                    cell.style.opacity = '0.9'; // 视觉上变灰一点
                } else {
                    // 恢复点击事件
                    if (cell.dataset.originalOnclick && cell.dataset.originalOnclick !== 'null') {
    const row = parseInt(cell.dataset.row);
    const col = parseInt(cell.dataset.col);
    cell.onclick = () => playerMove(row, col);
}
                    cell.style.cursor = 'pointer';
                    cell.style.opacity = '1';
                }
            });
        }

        // 高亮显示获胜的五子连线
function highlightWinningLine() {
    // 先清除之前可能的高亮
    clearWinningLineHighlights();
    
    // 检查谁赢了
    const winner = gameMap[lastMoveX][lastMoveY];
    if (winner === EMPTY) {
        console.log("无法确定胜方");
        return;
    }
    
    // 在四个方向上寻找获胜的连线
    const directions = [
        { dx: 0, dy: 1 },   // 水平
        { dx: 1, dy: 0 },   // 垂直
        { dx: 1, dy: 1 },   // 右下斜
        { dx: 1, dy: -1 }   // 左下斜
    ];
    
    let winningCells = [];
    
    // 从最后落子点开始检查每个方向
    for (const dir of directions) {
        const cells = findWinningLineInDirection(lastMoveX, lastMoveY, dir.dx, dir.dy, winner);
        if (cells && cells.length >= WIN_COUNT) {
            winningCells = cells;
            break; // 找到获胜连线，停止搜索
        }
    }
    
    // 高亮显示获胜连线
    if (winningCells.length >= WIN_COUNT) {
        winningCells.forEach(cell => {
            highlightCell(cell.x, cell.y);
        });
        console.log(`高亮了 ${winningCells.length} 个获胜棋子`);
    } else {
        console.log("未找到完整的获胜连线");
    }
}

// 在指定方向上寻找连续的获胜棋子
function findWinningLineInDirection(startX, startY, dx, dy, player) {
    const cells = [];
    
    // 向前搜索
    for (let i = 0; i < WIN_COUNT; i++) {
        const x = startX + dx * i;
        const y = startY + dy * i;
        if (x < 1 || x > BOARD_SIZE || y < 1 || y > BOARD_SIZE || gameMap[x][y] !== player) {
            break;
        }
        cells.push({ x, y });
    }
    
    // 向后搜索
    for (let i = 1; i < WIN_COUNT; i++) {
        const x = startX - dx * i;
        const y = startY - dy * i;
        if (x < 1 || x > BOARD_SIZE || y < 1 || y > BOARD_SIZE || gameMap[x][y] !== player) {
            break;
        }
        cells.unshift({ x, y }); // 加到数组开头
    }
    
    return cells;
}

// 高亮单个单元格
function highlightCell(x, y) {
    // 找到对应的DOM元素
    const cells = document.querySelectorAll('.cell[data-row][data-col]');
    for (const cell of cells) {
        const row = parseInt(cell.dataset.row);
        const col = parseInt(cell.dataset.col);
        if (row === x && col === y) {
            // 添加高亮样式
            cell.classList.add('winning-highlight');
            // 确保高亮在"最后落子高亮"之上
            cell.style.position = 'relative';
            cell.style.zIndex = '10';
            break;
        }
    }
}

// 清除之前的高亮
function clearWinningLineHighlights() {
    const highlightedCells = document.querySelectorAll('.winning-highlight');
    highlightedCells.forEach(cell => {
        cell.classList.remove('winning-highlight');
        cell.style.position = '';
        cell.style.zIndex = '';
    });
}

}

function updateGameInfo() {

        gameInfoElement.textContent = '👤 你的回合，点击棋盘落子';

        // 修改器功能
        function showAdmin() {
            adminPanel.style.display = 'block';
            infoPanel.style.display = 'none';
        }

        function hideAdmin() {
            adminPanel.style.display = 'none';
            updateGameInfo();
        }

        function removePiece() {
            const r = parseInt(document.getElementById('removeR').value);
            const c = parseInt(document.getElementById('removeC').value);
            if (r >= 1 && r <= BOARD_SIZE && c >= 1 && c <= BOARD_SIZE) {
                gameMap[r][c] = EMPTY;
                renderBoard();
            }
        }

        function changePiece() {
            const r = parseInt(document.getElementById('changeR').value);
            const c = parseInt(document.getElementById('changeC').value);
            const to = parseInt(document.getElementById('changeTo').value);
            if (r >= 1 && r <= BOARD_SIZE && c >= 1 && c <= BOARD_SIZE) {
                gameMap[r][c] = to;
                renderBoard();
            }
        }

        function letWin(player) {
            gameOver = true;
            if (player === PLAYER) {
                gameInfoElement.innerHTML = '<span class="win-text win-white">🎉 你获胜！（修改器判定）</span>';
                updateRobotExpression('lose');
                showResultScreen(true);
            } else {
                gameInfoElement.innerHTML = '<span class="win-text win-black">🤖 AI获胜！（修改器判定）</span>';
                updateRobotExpression('win');
                showResultScreen(false);
            }
            hideAdmin();
        }

        // 信息模式功能
        function showInfo() {
            infoPanel.style.display = 'block';
            adminPanel.style.display = 'none';
        }

        function hideInfo() {
            infoPanel.style.display = 'none';
            updateGameInfo();
        }

        // 重新开始游戏
        function restartGame() {
            hideAdmin();
            hideInfo();
            moveHistory = []; // 清空历史记录
            resultScreen.style.display = 'none';
            lockBoard(false);
            
            initGame();
        }

        // 页面加载完成后初始化游戏
        window.onload = initGame;
    </script>
